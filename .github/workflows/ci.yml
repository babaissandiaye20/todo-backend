name: backend-ci

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag (trim whitespace from username secret)
        id: img
        env:
          REG_USER: ${{ secrets.DOCKERUSERNAME }}
        run: |
          user="$(printf %s "$REG_USER" | tr -d '[:space:]')"
          echo "tag=${user}/todo_backend:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERTOCKEN }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.img.outputs.tag }}
